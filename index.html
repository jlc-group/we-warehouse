    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="WE Warehouse" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:title" content="WE Warehouse - ระบบจัดการคลังสินค้า" />
    <meta property="og:description" content="ระบบจัดการคลังสินค้าที่ทันสมัย พร้อมกราฟวิเคราะห์ การค้นหา และการจัดการสต็อกแบบเรียลไทม์" />

    <meta property="og:image" content="/icons/icon-512x512.png" />

    <meta name="twitter:image" content="/icons/icon-512x512.png" />
  </head>

  <body>
    <div id="root"></div>
    <!-- Load extension error handler before main app -->
    <script src="/extension-error-handler.js"></script>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register Service Worker + version check (auto-update on new deploy) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((registration) => {
            console.log('✅ Service Worker registered:', registration.scope);

            // เช็คเวอร์ชันใหม่ทุก 60 วินาที
            setInterval(() => registration.update().catch(() => {}), 60_000);

            // เมื่อพบ SW เวอร์ชันใหม่ที่ติดตั้งเสร็จแล้ว → แจ้ง user
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  window.dispatchEvent(new CustomEvent('app-update-available'));
                }
              });
            });
          }).catch((error) => {
            console.log('❌ Service Worker registration failed:', error);
          });

          // Backup version check: poll /index.html ทุก 2 นาที
          // ถ้า bundle hash เปลี่ยน → แจ้ง user (เผื่อ SW updatefound ไม่ทำงาน)
          const initialBundle = Array.from(document.scripts)
            .map(s => s.src).find(s => /\/assets\/index-[^/]+\.js/.test(s)) || '';
          setInterval(async () => {
            try {
              const res = await fetch('/?v=' + Date.now(), { cache: 'no-store' });
              const html = await res.text();
              const m = html.match(/\/assets\/index-[A-Za-z0-9_-]+\.js/);
              if (m && initialBundle && !initialBundle.endsWith(m[0])) {
                window.dispatchEvent(new CustomEvent('app-update-available'));
              }
            } catch { /* offline ก็ปล่อยผ่าน */ }
          }, 120_000);
        });
      }
    </script>
  </body>
</html>
